server {
    listen 80;
    listen [::]:80;
    server_name _;
    index index.html;

    location = / { return 302 /projects/PROJECT_NAME/; }

    location /health { return 200 'OK'; }

    # Compatibility API path.
    location /api/v1/ {
        proxy_pass http://127.0.0.1:BACKEND_PORT/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Project-scoped API path expected by deployed frontend.
    location /projects/PROJECT_NAME/api/v1/ {
        proxy_pass http://127.0.0.1:BACKEND_PORT/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /projects/PROJECT_NAME { return 301 /projects/PROJECT_NAME/; }

    location /projects/PROJECT_NAME/ {
        alias /var/www/html/projects/PROJECT_NAME/;
        try_files $uri $uri/ /projects/PROJECT_NAME/index.html;
    }

    location /projects/ {
        alias /var/www/html/projects/;
        try_files $uri $uri/ =404;
    }

    location /prds/ {
        alias /var/www/html/prds/;
        try_files $uri $uri/ =404;
    }
}
